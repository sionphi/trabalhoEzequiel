<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .container {
            background-color: #f0f0f0;
            padding: 20px;
            border: 2px solid #ccc;
        }

        .caixa-central {

            /* Exercício 2: */
            width: 50%;

            background-color: #8e44ad;
            color: white;
            padding: 20px;
            text-align: center;

            margin: 50px auto;

            /* Exercício 3: */
            margin-left: -50px;
        }

        .bloco-vizinho {
            background-color: #e67e22;
            padding: 15px;

            /* Exercício 4: */
            margin: 20px 0 40px 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="bloco-vizinho">
            Bloco Vizinho 1
        </div>

        <div class="bloco-vizinho">
            Bloco Vizinho 2
        </div>

        <div class="caixa-central">
            Eu estou centralizado com 'margin: auto'!
        </div>

    </div>

</body>

</html>
