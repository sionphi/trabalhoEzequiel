<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <style>
        /* Exercício 3: box-sizing desativado */
        /*
        * {
            box-sizing: border-box;
        }
        */

        .caixa-exemplo {
            width: 400px;
            background-color: #3498db;
            color: white;

            /* Exercício 1:*/
            padding: 80px;

            /* Exercício 2: */
            border: 10px double #2c3e50;

            /* Exercício 5: */
            border-radius: 20px;

            text-align: center;
            font-size: 20px;
        }

        .caixa-variada {
            width: 400px;
            margin-top: 20px;
            background-color: #ecf0f1;
            color: #333;
            border: 2px dashed #7f8c8d;

            padding-top: 10px;
            padding-bottom: 50px;
            padding-left: 20px;

            /* Exercício 4:*/
            padding-right: 100px;
        }
    </style>
</head>

<body>

    <div class="caixa-exemplo">
        Eu sou uma caixa azul com muito preenchimento interno!
    </div>

    <div class="caixa-variada">
        Esta caixa tem espaços internos diferentes em cada lado.
    </div>

</body>

</html>
