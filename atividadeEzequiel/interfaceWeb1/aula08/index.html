<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Roboto&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #fdfdfd;
            color: rgb(40, 40, 40);

            /* Exercício 5: */
            font-family: Georgia, serif;

            font-size: 18px;

            /* Exercício 2:*/
            line-height: 2.0;
        }

        h1 {
            /* Exercício 1:*/
            color: #2c3e50;

            font-family: 'Playfair Display', serif;
            font-size: 48px;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .destaque-cor {

            /* Exercício 3: */
            background-color: #000;
            color: #fff;

            padding: 5px 10px;
            font-weight: 700;
        }

        footer {
            text-align: center;
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            margin-top: 50px;

            /* Exercício 4:*/
            font-weight: 300;
        }
    </style>
</head>

<body>

    <header>
        <h1>A Arte da Leitura</h1>
        <p>Design não é apenas o que se vê, é como se <span class="destaque-cor">percebe</span>.</p>
    </header>

    <main>
        <p>
            Quando escolhemos as cores certas, guiamos o olhar do utilizador.
            A tipografia correta garante que a mensagem chegue sem esforço.
        </p>
    </main>

    <footer>
        Direitos de Design Reservados &copy; 2026
    </footer>

</body>

</html>
